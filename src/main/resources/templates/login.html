<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Tugas Deploy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-wrapper {
            display: flex;
            width: 520px;
            min-height: 420px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }
        .login-side {
            width: 190px;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 1rem;
        }
        .logo-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(99,84,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-inner {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #6354ff;
        }
        .side-title {
            color: #e0d9ff;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
        }
        .side-divider {
            width: 32px;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .side-sub {
            color: rgba(200,192,255,0.5);
            font-size: 11px;
            text-align: center;
            line-height: 1.6;
        }
        .nim-badge {
            background: rgba(99,84,255,0.2);
            border: 1px solid rgba(99,84,255,0.4);
            border-radius: 99px;
            padding: 4px 12px;
            color: #a89aff;
            font-size: 11px;
        }
        .login-main {
            flex: 1;
            background: #fff;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-main h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .login-main p.sub {
            font-size: 13px;
            color: #888;
            margin-bottom: 1.75rem;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }
        .form-control {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            height: 42px;
            font-size: 14px;
            padding-left: 14px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: #6354ff;
            box-shadow: 0 0 0 3px rgba(99,84,255,0.12);
        }
        .btn-login {
            width: 100%;
            height: 42px;
            background: #6354ff;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { opacity: 0.88; }
        .footer-note {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 1.25rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-side">
        <div class="logo-circle"><div class="logo-inner"></div></div>
        <div class="side-title">Tugas Deploy</div>
        <div class="side-divider"></div>
        <div class="side-sub">Sistem informasi manajemen berbasis web</div>
        <div class="nim-badge">20230140050</div>
    </div>
    <div class="login-main">
        <h2>Selamat datang</h2>
        <p class="sub">Masuk untuk melanjutkan ke sistem</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password (NIM)</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan NIM" required>
            </div>
            <button type="submit" class="btn-login">Masuk</button>
        </form>

        <p class="footer-note">Refky Muhammad Syahrin &mdash; 20230140050</p>
    </div>
</div>
</body>
</html>
