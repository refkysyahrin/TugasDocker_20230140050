<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Data Mahasiswa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">Dashboard Praktikum - 20230140050</span>
        <a th:href="@{/form}" class="btn btn-light btn-sm">Tambah Data</a>
    </div>
</nav>

<div class="container">
    <h3>Selamat Datang di Aplikasi Deploy</h3>
    <hr>

    <div th:if="${users.empty}" class="alert alert-warning">
        Belum ada data mahasiswa. Silahkan isi form terlebih dahulu.
    </div>

    <table class="table table-bordered table-striped" th:if="${!users.empty}">
        <thead class="table-dark">
        <tr>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.nama}"></td>
            <td th:text="${u.nim}"></td>
            <td th:text="${u.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>

    <footer class="mt-5 text-center text-muted">
        <p>&copy; 2026 - Refky Muhammad Syahrin (20230140050)</p>
    </footer>
</div>
</body>
</html>
