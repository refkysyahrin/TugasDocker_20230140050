<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Input Data - Tugas Deploy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f4f9; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .form-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #ece9ff;
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(99,84,255,0.08);
        }
        .form-card-top {
            background: #1a1a2e;
            padding: 1.5rem 1.75rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-dot { width: 22px; height: 22px; border-radius: 50%; background: #6354ff; flex-shrink: 0; }
        .form-top-title { color: #e0d9ff; font-size: 15px; font-weight: 600; margin: 0; }
        .form-top-sub { color: rgba(200,192,255,0.5); font-size: 12px; }
        .form-body { padding: 1.75rem; }

        .form-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
        .form-control, .form-select {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            height: 42px;
            font-size: 14px;
            background: #faf9ff;
            color: #1a1a2e;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #6354ff;
            box-shadow: 0 0 0 3px rgba(99,84,255,0.1);
            background: #fff;
        }

        /* Radio sebagai card */
        .gender-group { display: flex; gap: 10px; }
        .gender-opt {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #444;
            transition: border 0.15s, background 0.15s;
            user-select: none;
        }
        .gender-opt input[type="radio"] { accent-color: #6354ff; }
        .gender-opt:has(input:checked) {
            border-color: #6354ff;
            background: #f0eeff;
            color: #6354ff;
            font-weight: 600;
        }

        .btn-back {
            border: 1px solid #e0e0e0;
            background: #fff;
            color: #666;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-back:hover { background: #f5f4f9; color: #444; }
        .btn-save {
            background: #6354ff;
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn-save:hover { opacity: 0.88; color: #fff; }
    </style>
</head>
<body>
<div class="form-card">
    <div class="form-card-top">
        <div class="form-dot"></div>
        <div>
            <div class="form-top-title">Form Input Mahasiswa</div>
            <div class="form-top-sub">Isi data dengan lengkap dan benar</div>
        </div>
    </div>
    <div class="form-body">
        <form th:action="@{/save}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" th:field="*{nama}" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>
            <div class="mb-3">
                <label class="form-label">NIM</label>
                <input type="text" th:field="*{nim}" class="form-control" placeholder="Contoh: 20230140050" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Jenis Kelamin</label>
                <div class="gender-group">
                    <label class="gender-opt">
                        <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" checked>
                        Laki-laki
                    </label>
                    <label class="gender-opt">
                        <input type="radio" th:field="*{jenisKelamin}" value="Perempuan">
                        Perempuan
                    </label>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-4">
                <a th:href="@{/home}" class="btn-back">← Kembali</a>
                <button type="submit" class="btn-save">Simpan Data</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
